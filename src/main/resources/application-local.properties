spring.application.name=demo
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

spring.datasource.url=jdbc:h2:mem:mydb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${BACKEND_PORT:8080}
server.ssl.enabled=false

app.frontend.protocol=${APP_PROTOCOL:http}
app.frontend.host=${FRONTEND_HOST:localhost}
app.frontend.port=${FRONTEND_PORT:4000}
app.backend.host=${BACKEND_HOST:localhost}
app.backend.port=${BACKEND_PORT:8080}
app.media.base-url=${MEDIA_BASE_URL:https://www.trmc-addons.com/tfg-media}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:${app.frontend.protocol}://${app.frontend.host}:${app.frontend.port}}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
