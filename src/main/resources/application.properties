spring.application.name=demo
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:psql}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
# MAXIMO DE CONEXIONES ABIERTS 
server.tomcat.max-connections=1000

server.port=${BACKEND_PORT:8080}
server.ssl.enabled=false

app.frontend.protocol=${APP_PROTOCOL:http}
app.frontend.host=${FRONTEND_HOST:localhost}
app.frontend.port=${FRONTEND_PORT:4000}
app.backend.host=${BACKEND_HOST:localhost}
app.backend.port=${BACKEND_PORT:8080}
app.media.base-url=${MEDIA_BASE_URL:https://www.trmc-addons.com/tfg-media}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:${app.frontend.protocol}://${app.frontend.host}:${app.frontend.port}}

server.error.include-message=always
server.error.include-binding-errors=always

#cola de espera
server.tomcat.accept-count=100
#maximo de peticiones simultaneias
server.tomcat.threads.max=200
