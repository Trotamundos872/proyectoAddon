<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<div>
  <span id="contador">Servidor No Levantado</span>
</div>

<body>
    <script>
        //PRUEBA DE CARGA (MAXIMO 200 Simultaneas)

        for (let index = 0; index < 100; index++) {
            fetch("https://localhost:8443/api/addon")
        .then(responde => {
            return responde.json()
        })
        .then(datos => {
            console.log(datos)
            document.getElementById("contador").innerHTML = index
        })
            
        }
    </script>
</body>
</html>
