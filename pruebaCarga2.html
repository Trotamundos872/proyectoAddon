<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
<span id="contador">Servidor No Levantado</span>

<script>
    let contador = 0;
    const contadorSpan = document.getElementById("contador");

    async function atacarServidor() {
        while (true) {
            try {
                const response = await fetch("https://localhost:8443/api/addon");

                // Si el servidor responde con error HTTP
                if (!response.ok) {
                    throw new Error("Servidor respondió con error: " + response.status);
                }

                const datos = await response.json();
                console.log(datos);

                contador++;
                contadorSpan.innerHTML = contador;

            } catch (error) {
                console.error("El servidor no pudo más:", error);
                alert("Servidor caído tras " + contador + " peticiones");
                break; // se detiene cuando falla
            }
        }
    }

    atacarServidor();
</script>

</body>
</html>
